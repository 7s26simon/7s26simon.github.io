<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7s26simon | Security Professional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@300;500;700&family=Sacramento&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #2c3e50;
            --accent-blue: #3498db;
            --bg-light: #f4f7f6;
            --text-dark: #333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            text-align: center;
        }

        /* Top Header Section */
        #top-bar-blue {
            background-color: var(--primary-blue);
            color: white;
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }

        #name-font {
            font-family: 'Sacramento', cursive;
            font-size: 4.5rem;
            margin: 0;
        }

        .certs {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* Navigation */
        .topnav {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .topnav a {
            text-decoration: none;
            color: var(--primary-blue);
            padding: 10px 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .topnav a:hover {
            color: var(--accent-blue);
        }

        /* Section Styling */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-family: 'Merriweather', serif;
            margin: 40px 0 20px;
            color: var(--primary-blue);
            font-style: italic;
        }

        /* Logo Grid */
        .logo-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 50px;
        }

        .logo-card {
            transition: transform 0.3s ease;
        }

        .logo-card:hover {
            transform: translateY(-10px);
        }

        .logos {
            filter: grayscale(20%);
            transition: 0.3s;
            max-width: 150px;
            height: auto;
        }

        .logos:hover {
            filter: grayscale(0%);
        }

        /* Social Icons */
        #social-media {
            padding: 40px 0;
            background: #fff;
        }

        .social-icon {
            margin: 0 15px;
            opacity: 0.7;
            transition: 0.3s;
        }

        .social-icon:hover {
            opacity: 1;
        }

        /* Footer */
        #bottom-bar {
            background-color: var(--primary-blue);
            color: white;
            padding: 30px 0;
            font-size: 0.9rem;
        }

        /* Floating Cloud effect (simplified) */
        .cloud {
            position: absolute;
            opacity: 0.3;
        }
        #cloud-one { top: 20%; left: 10%; }
        #cloud-two { top: 40%; right: 10%; }

    </style>
</head>

<body>

    <header id="top-bar-blue">
        <img id="cloud-one" class="cloud" src="images/cloud.png" width="100" alt="cloud">
        <h1 id="name-font">Simon McCabe</h1>
        <p class="certs">Pentest+ | WAPT | OSCP | OSWP | PGCert | BSc | Linux+ | Security+</p>
        <img id="cloud-two" class="cloud" src="images/cloud.png" width="100" alt="cloud">
    </header>

    <nav class="topnav">
        <a href="/index.html">Home</a>
        <a href="/hackthebox.html">HackTheBox</a>
        <a href="/tryhackme.html">TryHackMe</a>
        <a href="/vulnhub.html">Vulnhub</a>
        <a href="/general.html">Security Blog</a>
        <a href="/quicklinks.html">Quick Links</a>
        <a href="/About.html">About</a>
    </nav>

    <main class="container">
        
        <h3 class="section-title">CTF Writeups</h3>
        <div class="logo-grid">
            <a href="./hackthebox.html" class="logo-card">
                <img class="logos" alt="hackthebox" src="images/htb.jpeg" title="HackTheBox">
            </a>
            <a href="./tryhackme.html" class="logo-card">
                <img class="logos" alt="tryhackme" src="images/THMlogo.png" title="TryHackMe">
            </a>
            <a href="./vulnhub.html" class="logo-card">
                <img class="logos" alt="vulnhub" src="images/vulnhub.png" title="Vulnhub">
            </a>
        </div>

        <hr style="border: 0; border-top: 1px solid #ddd; width: 50%;">

        <h3 class="section-title">Security Resources & Research</h3>
        <div class="logo-grid">
            <a href="./general.html" class="logo-card">
                <img class="logos" src="images/technical.png" title="General Security Blog" alt="tech">
            </a>
            <a href="./quicklinks.html" class="logo-card">
                <img class="logos" src="images/travel.png" title="Quick Links" alt="quicklinks">
            </a>
            <a href="./About.html" class="logo-card">
                <img class="logos" src="images/aboutme.png" title="About me" alt="about">
            </a>
        </div>

    </main>

    <section id="social-media">
        <a class="social-icon" href="https://www.linkedin.com/in/simcc/" target="_blank">
            <img src="images/linkedin.PNG" width="30" alt="linkedin">
        </a>
        <a class="social-icon" href="http://twitter.com/7s26simon" target="_blank">
            <img src="images/twitter.PNG" width="30" alt="twitter">
        </a>
        <a class="social-icon" href="https://www.youtube.com/channel/UCp8Iiw5FjmwDXKLV91t-j3Q" target="_blank">
            <img src="images/youtube.PNG" width="30" alt="youtube">
        </a>
    </section>

    <footer id="bottom-bar">
        <p>© 2026 Simon McCabe — <small>7s26simon.github.io</small></p>
        <a href="https://validator.w3.org/check?uri=referer">
            <img src="http://www.w3.org/Icons/valid-xhtml10" alt="Valid XHTML 1.0!" height="25">
        </a>
    </footer>

</body>
</html>
